<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción</title>
    <link rel="stylesheet" href="../index/index.css">
    <link rel="stylesheet" href="prediction.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <a href="../../index.html">
                    <img src="../../assets/img/logo_horizontal.png" alt="AURA Logo" style="max-width: 100%; height: auto;">
                </a>
            </div>

            <nav class="sidebar-menu">
                <a href="../symptoms/symptoms.html" class="menu-item">Síntomas</a>
                <a href="../prediction/prediction.html" class="menu-item active">Predicción</a>
                <a href="../aIAssistant/aiassistant.html" class="menu-item">Asistente IA</a>
            </nav>

            <button class="btn-cerrar-sesión">Cerrar Sesión</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="dashboard-header">
                <h1>Predicción de tu ciclo</h1>
            </header>

            <section class="top-row" style="grid-template-columns: 1fr; margin-top: 2rem;">
                <div class="card">
                    <div class="prediction-form">
                        <!-- INPUT FECHA -->
                        <div class="form-group">
                            <label>Última fecha de menstruación</label>
                            <input type="date" id="fecha" class="form-input">
                        </div>

                        <!-- INPUT CICLO -->
                        <div class="form-group">
                            <label>Duración del ciclo (días)</label>
                            <input type="number" id="ciclo" placeholder="Ej: 28" class="form-input">
                        </div>

                        <!-- BOTÓN -->
                        <button id="calcular" class="btn-primary">Calcular</button>
                    </div>

                    <!-- RESULTADO -->
                    <div class="resultado" style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.4); padding-top: 1.5rem;">
                        <p class="result-title">Próxima menstruación:</p>
                        <p id="proxima" class="result-value">-</p>

                        <p class="result-title" style="margin-top: 1rem;">Ventana fértil:</p>
                        <p id="fertil" class="result-value">-</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
             <div class="footer-logo"></div>
             <div class="footer-contacts">
                  <h4>Contactos</h4>
                  <p>Andres Espinosa Rojas</p>
                  <p>Alirio Andres Piña</p>
                  <p>Valentina Corredor</p>
                  <p>Laura Taborda</p>
                  <p>Juliana Patiño</p>
             </div>
             <div class="footer-cesde">
                  <h2>CESDE</h2>
             </div>
             <div class="footer-schedule">
                  <h3>Sábado</h3>
                  <p>7:30 a 6:00 pm</p>
             </div>
        </footer>
    </div>
    <script src="prediction.js"></script>
</body>
</html>
